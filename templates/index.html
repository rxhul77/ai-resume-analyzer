<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AI Resume Analyzer</title>

    <style>
    body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4f46e5, #2563eb);
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
    }

    .container {
    max-width: 900px;
    margin: auto;
    background-color: white;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    h1 {
    text-align: center;
    color: #1e293b;
    font-size: 34px;
    margin-bottom: 10px;
    }

    p {
        text-align: center;
        color: #555;
    }

    label {
        font-weight: bold;
    }

    input[type="file"],
    textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        margin-top: 8px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
    }

    textarea {
        resize: vertical;
    }

    button {
        width: 100%;
        padding: 14px;
        background-color: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background-color: #1d4ed8;
    }
    
    button:disabled {
    background-color: #94a3b8;
    cursor: not-allowed;
    opacity: 0.8;
    }

    .analysis-result {
        white-space: pre-wrap;
        font-family: Arial, sans-serif;
        line-height: 1.6;
        background-color: #f4f4f4;
        padding: 20px;
        border-radius: 8px;
        margin-top: 15px;
    }

    pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        background-color: #f8fafc;
        padding: 20px;
        border-radius: 8px;
        overflow-x: auto;
    }
    .message {
    margin-top: 20px;
    padding: 12px;
    background-color: #eaf2ff;
    border-left: 4px solid #2563eb;
    border-radius: 6px;
    font-weight: bold;
    }

    .spinner {
    display: none;
    width: 16px;
    height: 16px;
    margin-left: 10px;
    border: 2px solid white;
    border-top: 2px solid transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    }

    @keyframes spin {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }

    @media (max-width: 768px) {

    body {
        padding: 20px 10px;
    }

    .container {
        padding: 20px;
    }

    h1 {
        font-size: 28px;
    }

    textarea,
    input[type="file"],
    button {
        font-size: 14px;
    }

    .analysis-result {
        padding: 15px;
        font-size: 14px;
    }
    }

    .analysis-card {
    margin-top: 30px;
    background: #ffffff;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .analysis-card h2 {
    margin-top: 0;
    color: #2563eb;
    border-bottom: 2px solid #e5e7eb;
    padding-bottom: 10px;
    }

    .reset-button {
    display: block;
    width: 100%;
    box-sizing: border-box;
    margin-top: 12px;
    padding: 14px;
    text-align: center;
    text-decoration: none;
    background-color: #e2e8f0;
    color: #1e293b;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    }

    .reset-button:hover {
    background-color: #cbd5e1;
    }

    footer {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
    text-align: center;
    }

    footer p {
    margin: 0;
    color: #64748b;
    font-size: 14px;
    }

    </style>
</head>

<body>

    <div class="container">

    <h1>AI Resume Analyzer</h1>

    <p>
        Upload your resume and paste the job description.
    </p>

    <form method="POST" enctype="multipart/form-data">

        <label for="resume">
            Upload Resume PDF
        </label>

        <br><br>

        <input
            type="file"
            id="resume"
            name="resume"
            accept=".pdf"
            required
        >

        <br><br>

        <label for="job_description">
            Job Description
        </label>

        <br><br>

        <textarea
            id="job_description"
            name="job_description"
            rows="10"
            cols="60"
            placeholder="Paste the job description here..."
            required
        >{{ job_description }}</textarea>

        <br><br>

        <button type="submit" id="analyzeButton">
            <span id="buttonText">Analyze Resume</span>
            <span id="spinner" class="spinner"></span>
        </button>

        <a href="/" class="reset-button">
            Reset
        </a>

    </form>

    {% if message %}
    <div class="message">
        {{ message }}
    </div>
    {% endif %}

    {% if analysis_result %}

    <div class="analysis-card">

        <h2>📊 AI Resume Analysis</h2>

        <div class="analysis-result">
            {{ analysis_result }}
    </div>

</div>

{% endif %}

<footer>
    <p>Built with Flask, Python and Google Gemini AI</p>
</footer>

</div>
<script>
    const form = document.querySelector("form");
    const button = document.getElementById("analyzeButton");
    const buttonText = document.getElementById("buttonText");
    const spinner = document.getElementById("spinner");

    form.addEventListener("submit", function () {
        button.disabled = true;
        buttonText.innerText = "Analyzing Resume...";
        spinner.style.display = "inline-block";
    });
</script>
</body>
</html>
